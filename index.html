<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#faf7f2" />
<title>Semantic Bridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --bg-soft: #f3eee5;
    --ink: #1c1c1c;
    --ink-soft: #4a4a4a;
    --ink-dim: #888272;
    --line: #d8d2c4;
    --line-strong: #b8b0a0;
    --accent: #2e7d5b;
    --accent-soft: #d9ebe2;
    --accent-dark: #1d5640;
    --warn: #b94a3a;
    --warn-soft: #f3dcd5;
    --gold: #c89b3c;
    --gold-soft: #fdf6e3;
    --pill-bg: #ffffff;
    --shadow: 0 1px 2px rgba(28,28,28,0.06), 0 4px 10px rgba(28,28,28,0.05);
    --shadow-lg: 0 4px 24px rgba(28,28,28,0.10);
    --radius: 8px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    min-height: 100vh; font-size: 16px; line-height: 1.5;
  }
  body { padding: 24px 20px 64px; }
  a { color: var(--accent); }

  /* HEADER */
  .hdr {
    max-width: 640px; margin: 0 auto 20px;
    text-align: center; padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .title {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700; font-size: 36px; letter-spacing: -0.01em;
    color: var(--ink); margin: 0;
    font-variation-settings: 'opsz' 96;
  }
  .subtitle {
    font-size: 13px; color: var(--ink-dim); margin-top: 6px;
    letter-spacing: 0.04em;
  }
  .icon-btn {
    position: absolute; top: 0; right: 0;
    background: transparent; border: none; cursor: pointer;
    padding: 6px; color: var(--ink-soft); border-radius: 50%;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--bg-soft); color: var(--ink); }
  .icon-btn.left { right: auto; left: 0; }
  .icon-btn svg { width: 22px; height: 22px; display: block; }

  /* MAIN */
  .game { max-width: 580px; margin: 0 auto; }

  /* CHAIN PROGRESS ROW */
  .chain-row {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; flex-wrap: wrap;
    margin: 28px 0 28px; padding: 0 4px;
  }
  .cn {
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    font-size: 13px; padding: 8px 14px; border-radius: 999px;
    letter-spacing: 0.02em; white-space: nowrap;
  }
  .cn.start  { background: var(--ink); color: var(--bg); }
  .cn.finish { background: var(--accent); color: var(--bg); }
  .cn.solved { background: var(--accent-soft); color: var(--accent-dark); border: 1px solid var(--accent); }
  .cn.active { background: var(--bg-soft); color: var(--ink); border: 2px solid var(--ink); animation: pulse-border 1.6s ease-in-out infinite; }
  .cn.pending{ background: var(--bg-soft); color: var(--ink-dim); border: 1px dashed var(--line-strong); }
  .cn.giveup { background: var(--gold-soft); color: #6e4d18; border: 1px solid var(--gold); }
  @keyframes pulse-border {
    0%, 100% { border-color: var(--ink); }
    50% { border-color: var(--ink-dim); }
  }
  .chain-arrow { color: var(--line-strong); font-size: 14px; user-select: none; }

  /* STEP PROMPT */
  .step-prompt {
    text-align: center; font-size: 14px; color: var(--ink-soft);
    margin-bottom: 16px;
  }
  .step-prompt strong { color: var(--ink); }

  /* LETTER TILES */
  .tiles {
    display: flex; gap: 7px; justify-content: center;
    margin: 0 auto 14px; flex-wrap: nowrap;
  }
  .tile {
    width: 44px; height: 52px; border: 2px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 20px;
    font-weight: 700; text-transform: uppercase;
    border-radius: var(--radius); background: var(--pill-bg);
    color: var(--ink-dim); transition: border-color 0.25s, background 0.25s, color 0.25s;
    flex-shrink: 0;
  }
  .tile.revealed {
    border-color: var(--gold); background: var(--gold-soft);
    color: #6e4d18; animation: tile-pop 0.3s;
  }
  .tile.correct {
    border-color: var(--accent); background: var(--accent);
    color: #fff; animation: tile-pop 0.25s;
  }
  @keyframes tile-pop {
    0%   { transform: scale(0.8); }
    60%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  @keyframes tile-wave {
    0%,100% { transform: translateY(0); }
    40% { transform: translateY(-10px); }
  }

  /* WRONG GUESSES */
  .wrongs {
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    min-height: 30px; margin-bottom: 16px;
  }
  .wrong-pill {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    padding: 4px 10px; border-radius: 999px;
    background: var(--warn-soft); color: var(--warn);
    border: 1px solid var(--warn-soft);
    text-decoration: line-through;
  }

  /* INPUT AREA */
  .input-row {
    display: grid; grid-template-columns: 1fr auto;
    gap: 8px; margin: 0 auto 6px; max-width: 420px;
  }
  .word-input {
    background: var(--pill-bg); border: 1.5px solid var(--line);
    border-radius: var(--radius); padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace; font-size: 15px;
    color: var(--ink); outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    text-transform: lowercase; letter-spacing: 0.02em;
  }
  .word-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .add-btn {
    background: var(--ink); color: var(--bg); border: none;
    padding: 12px 22px; border-radius: var(--radius);
    font-family: 'Inter', sans-serif; font-weight: 600;
    font-size: 14px; cursor: pointer; transition: background 0.15s;
    letter-spacing: 0.04em;
  }
  .add-btn:hover { background: var(--accent-dark); }
  .add-btn:disabled { background: var(--ink-dim); cursor: not-allowed; opacity: 0.6; }
  .input-msg {
    text-align: center; font-size: 12px; min-height: 18px;
    color: var(--ink-dim); margin-top: 5px; margin-bottom: 20px;
  }
  .input-msg.err { color: var(--warn); }
  .input-msg.ok  { color: var(--accent); }

  @keyframes shake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.4s; }

  /* PROGRESS BAR */
  .progress {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 12px; max-width: 420px; margin: 0 auto 16px;
    text-align: center;
  }
  .progress > div {
    background: var(--pill-bg); border: 1px solid var(--line);
    padding: 10px 12px; border-radius: var(--radius);
  }
  .progress span {
    display: block; font-size: 10px; letter-spacing: 0.18em;
    color: var(--ink-dim); text-transform: uppercase; font-weight: 600;
  }
  .progress strong {
    display: block; font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 22px; color: var(--ink); margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }

  /* ACTIONS */
  .actions {
    display: flex; gap: 10px; justify-content: center;
    margin-top: 22px; flex-wrap: wrap;
  }
  .btn {
    background: var(--pill-bg); color: var(--ink);
    border: 1px solid var(--line); padding: 10px 18px;
    border-radius: var(--radius); font-family: inherit;
    font-size: 13px; font-weight: 600; cursor: pointer;
    letter-spacing: 0.04em; transition: all 0.15s;
  }
  .btn:hover { background: var(--bg-soft); border-color: var(--line-strong); }
  .btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .btn.danger { color: var(--warn); border-color: var(--warn-soft); }
  .btn.danger:hover { background: var(--warn-soft); }

  /* COMPLETION */
  .complete {
    max-width: 580px; margin: 32px auto 0;
    background: var(--pill-bg); border: 1px solid var(--line);
    border-radius: var(--radius-lg); padding: 28px 24px;
    text-align: center; box-shadow: var(--shadow-lg);
    animation: fade-in 0.45s;
  }
  .complete h2 {
    font-family: 'Fraunces', serif; font-weight: 700; font-size: 26px;
    margin: 0 0 6px; color: var(--accent-dark);
  }
  .complete p { margin: 0 0 18px; color: var(--ink-soft); font-size: 14px; }
  .stars { font-size: 28px; letter-spacing: 0.1em; margin-bottom: 14px; color: var(--gold); }
  .star-off { color: var(--line); }
  .summary-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin: 16px 0 18px;
  }
  .summary-grid > div {
    background: var(--bg-soft); padding: 10px 14px;
    border-radius: var(--radius); text-align: left;
  }
  .summary-grid span { font-size: 10px; letter-spacing: 0.18em; color: var(--ink-dim); text-transform: uppercase; font-weight: 600; }
  .summary-grid strong { display: block; font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink); margin-top: 2px; }

  /* MODAL */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(28,28,28,0.5);
    backdrop-filter: blur(4px); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; animation: fade-in 0.2s;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg); border-radius: var(--radius-lg);
    padding: 32px 28px; max-width: 520px; width: 100%;
    box-shadow: var(--shadow-lg); max-height: 90vh; overflow: auto;
    position: relative;
  }
  .modal h2 {
    font-family: 'Fraunces', serif; font-weight: 700; font-size: 26px;
    margin: 0 0 18px; color: var(--ink);
  }
  .modal h3 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px;
    margin: 18px 0 8px; color: var(--ink);
  }
  .modal p { font-size: 14px; color: var(--ink-soft); line-height: 1.65; margin: 0 0 12px; }
  .modal .close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; cursor: pointer;
    font-size: 24px; color: var(--ink-soft); padding: 4px; line-height: 1;
  }
  .modal .close:hover { color: var(--ink); }
  .modal .example {
    background: var(--bg-soft); padding: 12px 14px; border-radius: var(--radius);
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--ink); margin: 6px 0 12px; line-height: 1.8;
  }
  .hint-demo {
    display: flex; gap: 5px; justify-content: center; margin: 10px 0 16px;
  }
  .hint-demo .tile { width: 38px; height: 44px; font-size: 17px; }

  /* FOOTER */
  .footer {
    max-width: 640px; margin: 40px auto 0;
    text-align: center; font-size: 11px; color: var(--ink-dim);
    letter-spacing: 0.04em;
  }
  .footer a { color: var(--ink-soft); text-decoration: none; border-bottom: 1px solid var(--line); }
  .footer a:hover { color: var(--ink); }

  /* CONFETTI */
  .confetti { position: fixed; pointer-events: none; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; overflow: hidden; }
  .confetti span { position: absolute; width: 8px; height: 8px; animation: fall 2.4s linear forwards; opacity: 0.9; }
  @keyframes fall {
    0%   { transform: translateY(-20vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--bg); padding: 10px 18px;
    border-radius: var(--radius); font-size: 13px; font-weight: 500;
    z-index: 200; box-shadow: var(--shadow-lg); animation: toast-in 0.3s;
    white-space: nowrap;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translate(-50%, 12px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }

  /* MOBILE */
  @media (max-width: 520px) {
    body { padding: 16px 14px 64px; }
    .title { font-size: 28px; }
    .tile { width: 38px; height: 46px; font-size: 17px; }
    .progress { grid-template-columns: 1fr 1fr; }
    .progress > div:last-child { grid-column: 1 / -1; }
    .cn { font-size: 12px; padding: 7px 11px; }
  }
</style>
</head>
<body>

<header class="hdr">
  <button class="icon-btn left" id="help-btn" aria-label="How to play">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
  </button>
  <h1 class="title">Semantic Bridge</h1>
  <div class="subtitle" id="subtitle">Daily Puzzle · loading…</div>
  <button class="icon-btn" id="stats-btn" aria-label="Stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/>
      <line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
  </button>
</header>

<main class="game">
  <div class="chain-row" id="chain-row"></div>

  <div id="step-area">
    <div class="step-prompt" id="step-prompt"></div>
    <div class="tiles" id="tiles"></div>
    <div class="wrongs" id="wrongs"></div>
    <div class="input-row">
      <input type="text" class="word-input" id="word-input"
        placeholder="your guess…" autocomplete="off" autocapitalize="off"
        autocorrect="off" spellcheck="false" maxlength="24" />
      <button class="add-btn" id="add-btn">GUESS</button>
    </div>
    <div class="input-msg" id="input-msg">type a word, then press GUESS or Enter</div>
  </div>

  <div class="progress">
    <div><span>Step</span><strong id="step-display">1/3</strong></div>
    <div><span>Hints Used</span><strong id="hints-used">0</strong></div>
    <div><span>Streak</span><strong id="streak">0</strong></div>
  </div>

  <div class="actions">
    <button class="btn danger" id="giveup-btn">GIVE UP</button>
  </div>

  <div id="complete-host"></div>
</main>

<footer class="footer">
  <p>A daily word puzzle · <a href="#" id="about-link">About</a></p>
</footer>

<script>
'use strict';

const STORAGE_KEY = 'semanticBridge.v2';

// Each puzzle: 5-word path. Words connect via natural compound words or associations.
// bridge words are puzzle[1], puzzle[2], puzzle[3]
const PUZZLES = [
  ['dog',   'bone',   'break',  'dance',   'party'],   // breakdance, dance at a party
  ['sun',   'burn',   'match',  'game',    'play'],    // sunburn, burning match, game=match, gameplay
  ['fire',  'smoke',  'signal', 'phone',   'call'],    // smoke signal, phone signal, phone call
  ['rain',  'bow',    'tie',    'knot',    'sailor'],  // rainbow, bow tie, tie a knot, sailor's knot
  ['cold',  'ice',    'rink',   'skate',   'board'],   // ice rink, skate rink, skateboard
  ['moon',  'light',  'house',  'boat',    'captain'], // moonlight, lighthouse, houseboat
  ['star',  'fish',   'hook',   'line',    'story'],   // starfish, fishhook, hook & line, storyline
  ['cat',   'mouse',  'trap',   'door',    'bell'],    // cat & mouse, mousetrap, trapdoor, doorbell
  ['hand',  'shake',  'milk',   'cow',     'boy'],     // handshake, milkshake, milk cow, cowboy
  ['bread', 'crumb',  'trail',  'blaze',   'fire'],    // breadcrumb, crumb trail, blaze a trail, blaze=fire
  ['eye',   'lash',   'out',    'break',   'through'], // eyelash, lash out, outbreak, breakthrough
  ['foot',  'ball',   'park',   'bench',   'mark'],    // football, ballpark, park bench, benchmark
  ['book',  'worm',   'hole',   'punch',   'line'],    // bookworm, wormhole, hole punch, punchline
  ['sea',   'horse',  'race',   'track',   'record'],  // seahorse, horse race, racetrack, track record
  ['head',  'ache',   'pain',   'killer',  'whale'],   // headache, ache=pain, painkiller, killer whale
  ['door',  'step',   'ladder', 'snake',   'bite'],    // doorstep, stepladder, snakes & ladders, snakebite
  ['key',   'board',  'game',   'night',   'owl'],     // keyboard, board game, game night, night owl
  ['rock',  'slide',  'show',   'off',     'road'],    // rockslide, slideshow, show off, off-road
  ['arm',   'band',   'stand',  'up',      'beat'],    // armband, bandstand, stand up, upbeat
  ['wind',  'mill',   'stone',  'wall',    'flower'],  // windmill, millstone, stone wall, wallflower
  ['hair',  'pin',    'point',  'blank',   'check'],   // hairpin, pinpoint, point blank, blank check
  ['water', 'fall',   'back',   'yard',    'sale'],    // waterfall, fall back, backyard, yard sale
  ['air',   'craft',  'beer',   'garden',  'party'],   // aircraft, craft beer, beer garden, garden party
  ['snow',  'board',  'room',   'service', 'desk'],    // snowboard, boardroom, room service, service desk
  ['ear',   'ring',   'leader', 'ship',    'wreck'],   // earring, ringleader, leadership, shipwreck
  ['black', 'bird',   'cage',   'match',   'stick'],   // blackbird, birdcage, cage match, matchstick
  ['blue',  'print',  'screen', 'play',    'ground'],  // blueprint, print screen, screenplay, playground
  ['night', 'fall',   'back',   'stage',   'fright'],  // nightfall, fall back, backstage, stage fright
  ['long',  'bow',    'tie',    'break',   'down'],    // longbow, bow tie, tiebreaker, breakdown
  ['over',  'board',  'walk',   'way',     'out'],     // overboard, boardwalk, walkway, way out
  // Month 2
  ['back',  'fire',   'work',   'shop',    'lift'],    // backfire, firework, workshop, shoplifting
  ['under', 'cover',  'age',    'less',    'on'],      // undercover, coverage, ageless, lesson
  ['grand', 'stand',  'still',  'life',    'time'],    // grandstand, standstill, stilllife, lifetime
  ['high',  'light',  'year',   'book',    'end'],     // highlight, light-year, yearbook, bookend
  ['side',  'walk',   'out',    'door',    'step'],    // sidewalk, walkout, outdoor, doorstep
  ['play',  'ground', 'work',   'force',   'field'],   // playground, groundwork, workforce, forcefield
  ['cross', 'word',   'play',   'maker',   'space'],   // crossword, wordplay, playmaker, workspace
  ['up',    'stream', 'line',   'up',      'town'],    // upstream... hmm this reuses 'up'
  // replace
  ['sun',   'flower', 'pot',    'luck',    'box'],     // sunflower, flowerpot, potluck, luckbox - but duplicate sun
  // better new ones
  ['egg',   'shell',  'fish',   'tank',    'top'],     // eggshell, shellfish, fish tank, tank top
  ['eye',   'sight',  'less',   'on',      'line'],    // eyesight... 'on line' = online
  ['ink',   'well',   'being',  'done',    'deal'],    // inkwell, wellbeing, well done, done deal
  ['lip',   'stick',  'up',     'beat',    'box'],     // lipstick, stick up, upbeat, beatbox
  ['arm',   'pit',    'stop',   'watch',   'dog'],     // armpit, pit stop, stopwatch, watchdog
  ['card',  'board',  'walk',   'about',   'turn'],    // cardboard, boardwalk, walkabout, about-turn
  ['gold',  'fish',   'eye',    'lid',     'less'],    // goldfish, fish-eye, eyelid, lidless
  ['over',  'night',  'cap',    'size',    'able'],    // overnight, nightcap, capsizing... hmm
];

// ─────────────────────────────────────────────────────────────
// v1.01 — fixed-path redesign
//
// Each puzzle is a fixed 5-word chain: [start, b1, b2, b3, end].
// Adjacent pairs connect via a compound word or strong
// association. The player sees start and end; bridge words b1–b3
// are hidden and revealed one at a time. No branching, no
// alternate solutions — exactly one canonical path per puzzle.
//
// 35 puzzles below = 35-day pool before repeat.
// ─────────────────────────────────────────────────────────────
const CLEAN_PUZZLES = [
  ['dog',   'bone',   'break',  'dance',   'party'],
  ['sun',   'burn',   'match',  'game',    'play'],
  ['fire',  'smoke',  'signal', 'phone',   'call'],
  ['rain',  'bow',    'tie',    'knot',    'sailor'],
  ['cold',  'ice',    'rink',   'skate',   'board'],
  ['moon',  'light',  'house',  'boat',    'captain'],
  ['star',  'fish',   'hook',   'line',    'story'],
  ['cat',   'mouse',  'trap',   'door',    'bell'],
  ['hand',  'shake',  'milk',   'cow',     'boy'],
  ['bread', 'crumb',  'trail',  'blaze',   'fire'],
  ['eye',   'lash',   'out',    'break',   'through'],
  ['foot',  'ball',   'park',   'bench',   'mark'],
  ['book',  'worm',   'hole',   'punch',   'line'],
  ['sea',   'horse',  'race',   'track',   'record'],
  ['head',  'ache',   'pain',   'killer',  'whale'],
  ['door',  'step',   'ladder', 'snake',   'bite'],
  ['key',   'board',  'game',   'night',   'owl'],
  ['rock',  'slide',  'show',   'off',     'road'],
  ['arm',   'band',   'stand',  'up',      'beat'],
  ['wind',  'mill',   'stone',  'wall',    'flower'],
  ['hair',  'pin',    'point',  'blank',   'check'],
  ['water', 'fall',   'back',   'yard',    'sale'],
  ['air',   'craft',  'beer',   'garden',  'party'],
  ['snow',  'board',  'room',   'service', 'desk'],
  ['ear',   'ring',   'leader', 'ship',    'wreck'],
  ['black', 'bird',   'cage',   'match',   'stick'],
  ['blue',  'print',  'screen', 'play',    'ground'],
  ['night', 'fall',   'back',   'stage',   'fright'],
  ['egg',   'shell',  'fish',   'tank',    'top'],
  ['ink',   'well',   'being',  'done',    'deal'],
  ['lip',   'stick',  'up',     'beat',    'box'],
  ['arm',   'pit',    'stop',   'watch',   'dog'],
  ['card',  'board',  'walk',   'about',   'turn'],
  ['long',  'bow',    'tie',    'break',   'down'],
  ['over',  'board',  'walk',   'way',     'out'],
];

// Day 1 = Monday, May 25, 2026 (launch)
const LAUNCH_EPOCH = new Date(Date.UTC(2026, 4, 25));

function dayIndex() {
  const now = new Date();
  const today = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
  return Math.floor((today - LAUNCH_EPOCH) / 86400000);
}
function isLaunched() { return dayIndex() >= 0; }
function daysUntilLaunch() { return Math.max(0, -dayIndex()); }
function todaysPuzzle() {
  const idx = dayIndex();
  const i = idx < 0 ? 0 : idx % CLEAN_PUZZLES.length;
  return { day: Math.max(0, idx), puzzle: CLEAN_PUZZLES[i], preview: idx < 0 };
}
function todaysDateStr() {
  return new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

// --- Game state ---
let state = {
  day: 0,
  puzzle: null,
  step: 0,
  revealed: [0, 0, 0],
  wrongs: [[], [], []],
  solved: [false, false, false],
  complete: false,
  gaveUp: false,
};
const stats = loadStats();

function loadStats() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if (!r) return { lastPlayed: -1, streak: 0, totalWins: 0, history: {} };
    return JSON.parse(r);
  } catch(e) { return { lastPlayed: -1, streak: 0, totalWins: 0, history: {} }; }
}
function saveStats() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)); } catch(e) {}
}

function bridgeWord(s) { return state.puzzle[s + 1]; }
function prevWord(s)   { return state.puzzle[s]; }
function numSteps()    { return state.puzzle.length - 2; }
function totalHints()  { return state.revealed.reduce((a, b) => a + b, 0); }
function totalWrongs() { return state.wrongs.reduce((a, b) => a + b.length, 0); }

// --- Rendering ---
function $(id) { return document.getElementById(id); }

function renderHeader() {
  if (!isLaunched()) {
    const d = daysUntilLaunch();
    const ls = LAUNCH_EPOCH.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    $('subtitle').textContent = `Preview · launches ${ls} (${d} day${d===1?'':'s'} to go)`;
  } else {
    $('subtitle').textContent = `Daily Puzzle · Day ${state.day + 1} · ${todaysDateStr()}`;
  }
}

function renderChain() {
  const p = state.puzzle;
  const ns = numSteps();
  const parts = [];
  parts.push(`<span class="cn start">${p[0].toUpperCase()}</span>`);
  for (let i = 0; i < ns; i++) {
    parts.push(`<span class="chain-arrow">→</span>`);
    let cls, label;
    if (state.solved[i]) {
      cls = 'solved'; label = p[i+1].toUpperCase();
    } else if (state.gaveUp) {
      cls = 'giveup'; label = p[i+1].toUpperCase();
    } else if (i === state.step && !state.complete) {
      cls = 'active'; label = '?????';
    } else {
      cls = 'pending'; label = '?????';
    }
    parts.push(`<span class="cn ${cls}">${label}</span>`);
  }
  parts.push(`<span class="chain-arrow">→</span>`);
  parts.push(`<span class="cn finish">${p[p.length-1].toUpperCase()}</span>`);
  $('chain-row').innerHTML = parts.join('');
}

function renderTiles() {
  if (state.complete) { $('tiles').innerHTML = ''; return; }
  const word = bridgeWord(state.step);
  const rev  = state.revealed[state.step];
  const parts = [];
  for (let i = 0; i < word.length; i++) {
    const isRev = i < rev;
    parts.push(`<div class="tile${isRev ? ' revealed' : ''}">${isRev ? word[i].toUpperCase() : '·'}</div>`);
  }
  $('tiles').innerHTML = parts.join('');
}

function renderWrongs() {
  if (state.complete) { $('wrongs').innerHTML = ''; return; }
  const ws = state.wrongs[state.step];
  $('wrongs').innerHTML = ws.map(w => `<span class="wrong-pill">${w}</span>`).join('');
}

function renderProgress() {
  $('step-display').textContent = state.complete ? '✓' : `${state.step + 1}/${numSteps()}`;
  $('hints-used').textContent = totalHints();
  $('streak').textContent = stats.streak || 0;
}

function renderPrompt() {
  if (state.complete) { $('step-prompt').innerHTML = ''; return; }
  const ns = numSteps();
  const before = prevWord(state.step).toUpperCase();
  const after  = state.puzzle[state.step + 2]
    ? (state.solved[state.step + 1] || state.gaveUp
        ? state.puzzle[state.step + 2].toUpperCase()
        : '?')
    : state.puzzle[state.puzzle.length - 1].toUpperCase();
  $('step-prompt').innerHTML =
    `Word between <strong>${before}</strong> and <strong>${after}</strong> &nbsp;·&nbsp; Step ${state.step + 1} of ${ns}`;
}

function renderCompletion() {
  const host = $('complete-host');
  if (!state.complete) { host.innerHTML = ''; return; }
  const tw = totalWrongs();
  let stars = tw === 0 ? 3 : tw <= 2 ? 2 : 1;
  if (state.gaveUp) stars = 0;
  const starStr = '★'.repeat(stars) + `<span class="star-off">${'★'.repeat(3 - stars)}</span>`;
  const heading = state.gaveUp ? 'Bridge Collapsed' : 'Bridge Complete!';
  const msg = state.gaveUp ? 'Try again tomorrow.' : tw === 0 ? 'Flawless!' : tw <= 2 ? 'Nice solve.' : 'You got there.';
  host.innerHTML = `
    <div class="complete">
      <h2>${heading}</h2>
      <div class="stars">${starStr}</div>
      <p>${msg}</p>
      <div class="summary-grid">
        <div><span>Hints Used</span><strong>${totalHints()}</strong></div>
        <div><span>Wrong Guesses</span><strong>${tw}</strong></div>
      </div>
      <div class="actions">
        <button class="btn primary" id="share-btn">SHARE</button>
      </div>
    </div>
  `;
  $('share-btn').addEventListener('click', shareResult);
}

function renderAll() {
  renderHeader();
  renderChain();
  renderPrompt();
  renderTiles();
  renderWrongs();
  renderProgress();
  renderCompletion();
  const done = state.complete;
  $('word-input').disabled = done;
  $('add-btn').disabled = done;
  $('giveup-btn').disabled = done;
  $('step-area').style.display = done ? 'none' : '';
}

// --- Game actions ---
function setMsg(text, kind = '') {
  const el = $('input-msg');
  el.textContent = text;
  el.className = 'input-msg' + (kind ? ' ' + kind : '');
}

function attemptGuess() {
  if (state.complete) return;
  const raw = $('word-input').value.trim().toLowerCase();
  if (!raw) { setMsg('type a word first', 'err'); return; }
  if (!/^[a-z]{1,24}$/.test(raw)) { setMsg('letters only, no spaces', 'err'); shakeInput(); return; }

  const target = bridgeWord(state.step);

  if (raw === target) {
    // Correct!
    state.solved[state.step] = true;
    $('word-input').value = '';
    setMsg('', '');
    waveCorrectTiles();
    setTimeout(() => {
      if (state.step === numSteps() - 1) {
        completeGame(false);
      } else {
        state.step++;
        renderAll();
        setMsg('nice — keep going!', 'ok');
        $('word-input').focus();
      }
      saveProgress();
    }, 380);
  } else {
    // Wrong
    if (state.wrongs[state.step].includes(raw)) {
      setMsg(`already tried "${raw}"`, 'err');
      shakeInput();
      return;
    }
    state.wrongs[state.step].push(raw);
    const word = bridgeWord(state.step);
    state.revealed[state.step] = Math.min(state.revealed[state.step] + 1, word.length);
    $('word-input').value = '';
    const rev = state.revealed[state.step];
    const hint = rev < word.length ? `hint: ${word.slice(0,rev).toUpperCase()}${'·'.repeat(word.length - rev)}` : 'no more hints!';
    setMsg(`not quite — ${hint}`, 'err');
    shakeInput();
    saveProgress();
    renderAll();
    $('word-input').focus();
  }
}

function waveCorrectTiles() {
  const tiles = $('tiles').querySelectorAll('.tile');
  tiles.forEach((t, i) => {
    t.classList.add('correct');
    t.textContent = bridgeWord(state.step)[i].toUpperCase();
  });
  tiles.forEach((t, i) => {
    t.style.animation = 'none';
    setTimeout(() => { t.style.animation = `tile-wave 0.5s ${i * 0.07}s ease-in-out`; }, 10);
  });
}

function shakeInput() {
  const el = $('word-input');
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
}

function completeGame(gaveUp) {
  state.complete = true;
  state.gaveUp = gaveUp;
  if (!gaveUp) {
    stats.totalWins = (stats.totalWins || 0) + 1;
    const yesterday = state.day - 1;
    if (stats.lastPlayed === yesterday) stats.streak = (stats.streak || 0) + 1;
    else if (stats.lastPlayed !== state.day) stats.streak = 1;
    stats.lastPlayed = state.day;
  }
  stats.history[String(state.day)] = {
    won: !gaveUp,
    hints: totalHints(),
    wrongs: totalWrongs(),
    date: Date.now(),
  };
  saveStats();
  saveProgress();
  renderAll();
  if (!gaveUp) setTimeout(throwConfetti, 250);
}

function giveUp() {
  if (!confirm('Give up on today\'s bridge?')) return;
  completeGame(true);
}

function shareResult() {
  const tw = totalWrongs();
  const th = totalHints();
  const stars = state.gaveUp ? 0 : tw === 0 ? 3 : tw <= 2 ? 2 : 1;
  const starStr = '⭐'.repeat(stars) || '—';
  const path = state.puzzle.join(' → ').toUpperCase();
  const txt = `Semantic Bridge · Day ${state.day + 1}\n${path}\n${state.gaveUp ? '(gave up)' : starStr}\nHints: ${th} · Wrong: ${tw}`;
  if (navigator.share) {
    navigator.share({ text: txt }).catch(() => copyToClipboard(txt));
  } else {
    copyToClipboard(txt);
  }
}

function copyToClipboard(text) {
  try {
    navigator.clipboard.writeText(text).then(
      () => toast('Copied to clipboard'),
      () => fallbackCopy(text)
    );
  } catch(e) { fallbackCopy(text); }
}
function fallbackCopy(text) {
  const t = document.createElement('textarea'); t.value = text;
  document.body.appendChild(t); t.select();
  try { document.execCommand('copy'); toast('Copied'); } catch(e) {}
  t.remove();
}
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1800);
}

// --- Progress persistence ---
function saveProgress() {
  const d = { day: state.day, step: state.step, revealed: state.revealed, wrongs: state.wrongs, solved: state.solved, complete: state.complete, gaveUp: state.gaveUp };
  try { localStorage.setItem(STORAGE_KEY + '.p', JSON.stringify(d)); } catch(e) {}
}
function loadProgress() {
  try {
    const r = localStorage.getItem(STORAGE_KEY + '.p');
    if (!r) return null;
    const d = JSON.parse(r);
    if (d.day !== state.day) return null;
    return d;
  } catch(e) { return null; }
}

// --- Confetti ---
function throwConfetti() {
  const wrap = document.createElement('div');
  wrap.className = 'confetti';
  const colors = ['#2e7d5b','#c89b3c','#1c1c1c','#b94a3a','#5b6cff'];
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random() * 100 + 'vw';
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    s.style.animationDelay = (Math.random() * 0.6) + 's';
    s.style.animationDuration = (1.8 + Math.random() * 1.4) + 's';
    s.style.width = (4 + Math.random() * 8) + 'px';
    s.style.height = s.style.width;
    s.style.borderRadius = Math.random() < 0.5 ? '50%' : '2px';
    wrap.appendChild(s);
  }
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 3200);
}

// --- Modals ---
function showModal(html) {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal"><button class="close" aria-label="Close">×</button>${html}</div>`;
  document.body.appendChild(bg);
  bg.querySelector('.close').addEventListener('click', () => bg.remove());
  bg.addEventListener('click', (e) => { if (e.target === bg) bg.remove(); });
}

function showHelp() {
  showModal(`
    <h2>How to Play</h2>
    <p>Each puzzle hides <strong>3 bridge words</strong> between a start and an end. The words connect like compound words or classic associations — each pair makes a natural link.</p>
    <div class="example">
      DOG → BONE → BREAK → DANCE → PARTY<br>
      <small style="color:var(--ink-dim)">dog+bone · break+bone · break+dance · dance+party</small>
    </div>
    <h3>Guessing</h3>
    <p>Type your guess for the current bridge word and press <strong>GUESS</strong> or Enter. You don't need to know all three at once — solve them one at a time.</p>
    <h3>Hints</h3>
    <p>Every wrong guess reveals the next letter of the answer:</p>
    <div class="hint-demo">
      <div class="tile">·</div><div class="tile">·</div><div class="tile">·</div><div class="tile">·</div><div class="tile">·</div>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--ink-dim);margin-top:-8px;">after one wrong guess →</p>
    <div class="hint-demo">
      <div class="tile revealed">B</div><div class="tile">·</div><div class="tile">·</div><div class="tile">·</div><div class="tile">·</div>
    </div>
    <h3>Scoring</h3>
    <p>★★★ = zero wrong guesses &nbsp;·&nbsp; ★★ = 1–2 wrong &nbsp;·&nbsp; ★ = 3 or more</p>
  `);
}

function showStats() {
  const won = Object.values(stats.history || {}).filter(h => h && h.won);
  const avgH = won.length ? (won.reduce((a, h) => a + (h.hints||0), 0) / won.length).toFixed(1) : '—';
  const today = stats.history[String(state.day)];
  const todayLine = today
    ? (today.won ? `<p>Today: solved · hints ${today.hints} · wrong ${today.wrongs}</p>` : `<p>Today: gave up</p>`)
    : '';
  showModal(`
    <h2>Your Stats</h2>
    ${todayLine}
    <div class="summary-grid">
      <div><span>Streak</span><strong>${stats.streak || 0}</strong></div>
      <div><span>Total Wins</span><strong>${stats.totalWins || 0}</strong></div>
      <div><span>Days Played</span><strong>${Object.keys(stats.history || {}).length}</strong></div>
      <div><span>Avg Hints</span><strong>${avgH}</strong></div>
    </div>
  `);
}

function showAbout() {
  const ls = LAUNCH_EPOCH.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  const line = isLaunched()
    ? `<p>Launched ${ls}. Day ${dayIndex() + 1} of the run.</p>`
    : `<p>Official launch: <strong>${ls}</strong>. Playing the Day 1 preview.</p>`;
  showModal(`
    <h2>About</h2>
    <p>Semantic Bridge is a daily word puzzle. Connect a start word to an end word through three hidden bridge words — each pair forms a compound word or a natural association.</p>
    ${line}
    <p>No API, no accounts, no tracking. Progress is saved locally.</p>
    <p>Made by an enthusiast. Free, open.</p>
  `);
}

// --- Init ---
function init() {
  const today = todaysPuzzle();
  state.day    = today.day;
  state.puzzle = today.puzzle;
  state.revealed = new Array(numSteps()).fill(0);
  state.wrongs   = Array.from({ length: numSteps() }, () => []);
  state.solved   = new Array(numSteps()).fill(false);

  const progress = loadProgress();
  if (progress) {
    state.step     = progress.step     ?? 0;
    state.revealed = progress.revealed ?? state.revealed;
    state.wrongs   = progress.wrongs   ?? state.wrongs;
    state.solved   = progress.solved   ?? state.solved;
    state.complete = !!progress.complete;
    state.gaveUp   = !!progress.gaveUp;
  }

  renderAll();

  $('add-btn').addEventListener('click', attemptGuess);
  $('word-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); attemptGuess(); } });
  $('giveup-btn').addEventListener('click', giveUp);
  $('help-btn').addEventListener('click', showHelp);
  $('stats-btn').addEventListener('click', showStats);
  $('about-link').addEventListener('click', (e) => { e.preventDefault(); showAbout(); });

  if (!localStorage.getItem(STORAGE_KEY + '.seen')) {
    setTimeout(showHelp, 400);
    localStorage.setItem(STORAGE_KEY + '.seen', '1');
  }

  if (!state.complete) $('word-input').focus();
}

init();
</script>
</body>
</html>
